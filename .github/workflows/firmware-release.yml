name: Firmware Release

# Dispara con tags fw-v* (p.ej. fw-v1.0.0) o manualmente.
# Compila firmware/simhit/simhit.ino para ESP32-C3 con arduino-cli en una
# matrix de drivers de sensor (uno .bin por sensor soportado). Cada build
# pasa -DSENSOR_DRIVER=<slug_mayus> como build flag, que el firmware lee con
# #if SENSOR_DRIVER == LXXX para activar el driver correspondiente.
#
# Para agregar un sensor nuevo:
#   1) Implementar el driver en firmware/simhit/ con #if SENSOR_DRIVER == NUEVO
#   2) Agregar la entrada al strategy.matrix.sensor de abajo
#   3) Tag fw-v* → se generan todos los .bin y se publican en el Release
on:
  push:
    tags:
      - 'fw-v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Versión a estampar (sin el prefijo fw-v). Opcional.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.sensor.label }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        sensor:
          # slug: identificador en URL y comando build. macro: pasada al compilador.
          # label: nombre en el Release. El driver L3G cubre L3GD20H, L3GD20 y
          # L3G4200D — son variantes del mismo bus/protocolo, se discriminan
          # solo por WHO_AM_I y eso lo hace el firmware en runtime.
          - slug: l3g-lsm303
            macro: L3G_LSM303
            label: 'Compilar — L3G + LSM303 [default, validado]'
          - slug: icm-42688
            macro: ICM_42688
            label: 'Compilar — ICM-42688 [sin testear con hardware]'
          - slug: mpu9250
            macro: MPU9250
            label: 'Compilar — MPU-9250 [sin testear con hardware]'
          - slug: bno055
            macro: BNO055
            label: 'Compilar — BNO055 [sin testear con hardware]'
          - slug: mpu6050
            macro: MPU_6050
            label: 'Compilar — MPU-6050 [sin testear con hardware]'
          - slug: itg-adxl-hmc
            macro: ITG_ADXL_HMC
            label: 'Compilar — HW-579 (ITG-3205 + ADXL345 + HMC5883L) [sin testear]'

    env:
      FQBN: esp32:esp32:XIAO_ESP32C3
      CORE_INDEX: https://espressif.github.io/arduino-esp32/package_esp32_index.json

    steps:
      - uses: actions/checkout@v4

      - name: Derivar versión
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            v="${GITHUB_REF_NAME#fw-v}"
          else
            v="${{ inputs.version_override }}"
            [[ -z "$v" ]] && v="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Verificar coherencia con FW_VERSION_STRING
        if: github.event_name == 'push'
        shell: bash
        run: |
          v="${{ steps.ver.outputs.version }}"
          fw=$(grep -oP '#define FW_VERSION_STRING "\K[^"]+' firmware/simhit/simhit.ino || true)
          if [[ "$v" != "$fw" ]]; then
            echo "::error::tag $v no coincide con FW_VERSION_STRING $fw en simhit.ino"
            exit 1
          fi

      - name: Instalar arduino-cli
        shell: bash
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR="$HOME/bin" sh
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Configurar core ESP32 + instalar
        shell: bash
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls "$CORE_INDEX"
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Instalar librerías Adafruit
        shell: bash
        run: |
          arduino-cli lib install \
            "Adafruit Unified Sensor" \
            "Adafruit LSM303 Accel" \
            "Adafruit LSM303DLH Mag" \
            "Adafruit AHRS"

      - name: Compilar
        shell: bash
        run: |
          mkdir -p firmware/build
          arduino-cli compile \
            --fqbn "$FQBN" \
            --output-dir firmware/build \
            --warnings none \
            --build-property "compiler.cpp.extra_flags=-DSENSOR_DRIVER=${{ matrix.sensor.macro }}" \
            firmware/simhit

      - name: Empaquetar artefactos
        id: pkg
        shell: bash
        run: |
          v="${{ steps.ver.outputs.version }}"
          slug="${{ matrix.sensor.slug }}"
          base="simhit-fw-${v}-esp32c3-${slug}"
          cd firmware/build
          cp simhit.ino.bin "../../${base}.bin"
          cp simhit.ino.elf "../../${base}.elf" 2>/dev/null || true
          if [[ -f simhit.ino.merged.bin ]]; then
            cp simhit.ino.merged.bin "../../${base}.merged.bin"
          fi
          cd ../..
          sha256sum "${base}.bin"        > "${base}.sha256"
          sha256sum "${base}.merged.bin" > "${base}.merged.sha256"
          ls -la "${base}".*
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "sha=$(awk '{print $1}' ${base}.sha256)" >> "$GITHUB_OUTPUT"
          echo "merged_sha=$(awk '{print $1}' ${base}.merged.sha256)" >> "$GITHUB_OUTPUT"

      - name: Subir artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.base }}
          path: |
            ${{ steps.pkg.outputs.base }}.bin
            ${{ steps.pkg.outputs.base }}.merged.bin
            ${{ steps.pkg.outputs.base }}.elf
            ${{ steps.pkg.outputs.base }}.sha256
            ${{ steps.pkg.outputs.base }}.merged.sha256

      - name: Crear/actualizar Release
        if: startsWith(github.ref, 'refs/tags/fw-v')
        uses: softprops/action-gh-release@v2
        with:
          name: 🔌 Firmware v${{ steps.ver.outputs.version }} (ESP32-C3)
          body: |
            > ⚠️ **Esto es FIRMWARE del dispositivo (microcontrolador ESP32-C3 dentro de la gafa SimHIT), NO es el software de escritorio.**
            >
            > Para descargar la aplicación SimHIT (Linux/Windows) busque los Releases con tag `v2026.*`.

            ## Instalación recomendada — desde la app SimHIT

            1. Abra SimHIT y conecte la gafa por USB-C.
            2. Vaya a la pestaña **Métricas → paso 1 (Firmware)**.
            3. La app detecta automáticamente la versión instalada y la compara contra este Release.
            4. Si hay actualización disponible, presione **Flashear**.

            No requiere `esptool.py`, terminal ni Arduino IDE.

            ## Binarios por sensor

            Este Release incluye un `.bin` por driver de sensor soportado.
            Use el que corresponda al IMU instalado en su gafa:

            | Sensor IMU | Archivo | Estado |
            |---|---|---|
            | L3G (todas las variantes) + LSM303 _(default)_ | `simhit-fw-${{ steps.ver.outputs.version }}-esp32c3-l3g-lsm303.merged.bin` | ✓ validado en hardware |
            | ICM-42688 | `simhit-fw-${{ steps.ver.outputs.version }}-esp32c3-icm-42688.merged.bin` | ⚠ sin testear |
            | MPU-9250 + AK8963 | `simhit-fw-${{ steps.ver.outputs.version }}-esp32c3-mpu9250.merged.bin` | ⚠ sin testear |
            | BNO055 (fusión interna) | `simhit-fw-${{ steps.ver.outputs.version }}-esp32c3-bno055.merged.bin` | ⚠ sin testear |
            | MPU-6050 (6-DOF) | `simhit-fw-${{ steps.ver.outputs.version }}-esp32c3-mpu6050.merged.bin` | ⚠ sin testear |
            | HW-579 (ITG-3205 + ADXL345 + HMC5883L) | `simhit-fw-${{ steps.ver.outputs.version }}-esp32c3-itg-adxl-hmc.merged.bin` | ⚠ sin testear |

            **Board:** `${{ env.FQBN }}` (ESP32-C3 SuperMini)

            ## Flasheo manual (avanzado / debugging)

            ```bash
            esptool.py --chip esp32c3 --port /dev/ttyACM0 --baud 460800 \
              write_flash -z 0x0 simhit-fw-${{ steps.ver.outputs.version }}-esp32c3-<sensor>.merged.bin
            ```
          files: |
            ${{ steps.pkg.outputs.base }}.bin
            ${{ steps.pkg.outputs.base }}.merged.bin
            ${{ steps.pkg.outputs.base }}.elf
            ${{ steps.pkg.outputs.base }}.sha256
            ${{ steps.pkg.outputs.base }}.merged.sha256
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
