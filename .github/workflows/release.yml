name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
          - os: windows-latest
            target: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libudev-dev \
            pkg-config \
            patchelf

      - name: Install npm deps
        working-directory: app
        run: npm ci

      - name: Build (Linux — solo binario)
        if: matrix.os == 'ubuntu-22.04'
        working-directory: app
        run: npm run tauri -- build --no-bundle

      - name: Build (Windows — instalador NSIS)
        if: matrix.os == 'windows-latest'
        working-directory: app
        run: npm run tauri -- build --bundles nsis

      - name: Empaquetar binario Linux
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cp app/src-tauri/target/release/simhit simhit-${{ github.ref_name }}-linux-x86_64
          chmod +x simhit-${{ github.ref_name }}-linux-x86_64

      - name: Renombrar instalador Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          src=$(ls app/src-tauri/target/release/bundle/nsis/*-setup.exe | head -1)
          cp "$src" "simhit-${{ github.ref_name }}-windows-x86_64-setup.exe"

      - name: Subir al release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            simhit-${{ github.ref_name }}-linux-x86_64
            simhit-${{ github.ref_name }}-windows-x86_64-setup.exe
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          generate_release_notes: true
