name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust-tests:
    name: Rust — tests del módulo de métricas
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libudev-dev \
            pkg-config

      # Las pruebas comparten el estático ACTIVE de capture.rs.
      # Forzamos un solo hilo para evitar colisiones entre tests.
      - name: cargo test
        working-directory: app/src-tauri
        run: cargo test --lib -- --test-threads=1

      - name: cargo check (release-like flags)
        working-directory: app/src-tauri
        run: cargo check --all-targets

  frontend-checks:
    name: Frontend — svelte-check + tipos
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: npm ci
        working-directory: app
        run: npm ci

      # svelte-kit sync genera los tipos de rutas requeridos por svelte-check.
      - name: svelte-kit sync
        working-directory: app
        run: npx svelte-kit sync

      - name: svelte-check
        working-directory: app
        run: npx svelte-check --threshold error
